<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Python Preparation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
color:white;
min-height:100vh;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1f4037);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
}

header h1{
font-size:26px;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

/* UPLOAD BOX */

.uploadBox{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:12px;
margin-bottom:30px;
animation:fadeUp 1s;
}

.uploadBox input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:6px;
}

.uploadBox button{
padding:10px 16px;
background:#06b6d4;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.uploadBox button:hover{
background:#0891b2;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:15px;
backdrop-filter:blur(10px);
transition:0.3s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card h3{
margin-bottom:10px;
}

.card button{
padding:10px 16px;
border:none;
background:#4f46e5;
color:white;
border-radius:6px;
cursor:pointer;
}

.card button:hover{
background:#4338ca;
}

/* VIEWER */

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:999;
animation:viewerOpen 0.4s ease;
}

.viewer iframe{
width:100%;
height:100%;
border:none;
}

.close{
position:absolute;
top:15px;
right:20px;
padding:8px 14px;
background:red;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

@keyframes viewerOpen{
from{opacity:0;transform:scale(.95);}
to{opacity:1;transform:scale(1);}
}

/* ANIMATIONS */

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

.particle{
position:absolute;
width:6px;
height:6px;
background:white;
opacity:.3;
border-radius:50%;
animation:float 8s infinite linear;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-100vh);}
}

</style>

</head>

<body>

<header>
<h1>🐍 Python Preparation Dashboard</h1>
</header>

<div class="container">

<!-- ADD MATERIAL -->

<div class="uploadBox">

<h3>Add Study Material</h3>

<input id="titleInput" placeholder="Enter Material Title">

<input id="linkInput" placeholder="Paste Google Drive Link">

<button onclick="addMaterial()">Add Dashboard</button>

</div>

<!-- DASHBOARD -->

<div class="grid" id="materials"></div>

</div>

<!-- VIEWER -->

<div class="viewer" id="viewer">

<button class="close" onclick="closeViewer()">Close</button>

<iframe id="frame"></iframe>

</div>

<script>

/* CREATE DASHBOARD CARD */

function addMaterial(){

let title=document.getElementById("titleInput").value;

let link=document.getElementById("linkInput").value;

if(title=="" || link==""){
alert("Enter title and link");
return;
}

/* convert drive link */

let previewLink=link.replace("/view","/preview");

/* card */

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<h3 contenteditable="true">${title}</h3>

<button onclick="openViewer('${previewLink}')">View</button>

`;

document.getElementById("materials").appendChild(card);

/* clear input */

document.getElementById("titleInput").value="";
document.getElementById("linkInput").value="";

}

/* VIEWER */

function openViewer(link){

document.getElementById("viewer").style.display="block";

document.getElementById("frame").src=link;

}

function closeViewer(){

document.getElementById("viewer").style.display="none";

document.getElementById("frame").src="";

}

/* PARTICLES BACKGROUND */

for(let i=0;i<40;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"%";

p.style.animationDuration=5+Math.random()*5+"s";

document.body.appendChild(p);

}

</script>

</body>
</html>
