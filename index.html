<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Python Preparation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
color:white;
overflow-x:hidden;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1f4037);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
animation:fadeDown 1s ease;
}

@keyframes fadeDown{
from{opacity:0; transform:translateY(-30px);}
to{opacity:1; transform:translateY(0);}
}

header h1{
font-size:26px;
font-weight:600;
letter-spacing:1px;
}

header button{
padding:10px 18px;
border:none;
background:linear-gradient(45deg,#4f46e5,#06b6d4);
color:white;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

header button:hover{
transform:scale(1.05);
}

/* DASHBOARD */

.container{
max-width:1100px;
margin:auto;
padding:50px 20px;
animation:fadeUp 1.2s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:15px;
backdrop-filter:blur(10px);
transition:0.4s;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
width:120%;
height:120%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.2),transparent);
top:-100%;
left:-100%;
transition:0.6s;
}

.card:hover::before{
top:100%;
left:100%;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card h3{
margin-bottom:10px;
font-weight:500;
}

.card p{
font-size:14px;
opacity:0.8;
}

.card button{
margin-top:15px;
padding:10px 18px;
border:none;
background:#06b6d4;
color:white;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.card button:hover{
background:#0891b2;
transform:scale(1.05);
}

/* VIEWER */

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
z-index:999;
animation:viewerOpen 0.6s ease;
}

@keyframes viewerOpen{
from{opacity:0; transform:scale(0.95);}
to{opacity:1; transform:scale(1);}
}

.viewer iframe{
width:100%;
height:100%;
border:none;
}

.close{
position:absolute;
top:15px;
right:20px;
background:red;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* TEST PANEL */

.test-panel{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.9);
background:white;
color:black;
padding:30px;
border-radius:12px;
width:350px;
z-index:1000;
animation:panelOpen 0.4s forwards;
}

@keyframes panelOpen{
to{transform:translate(-50%,-50%) scale(1);}
}

.test-panel input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

.test-panel button{
margin-top:10px;
padding:10px;
border:none;
background:#4f46e5;
color:white;
border-radius:6px;
cursor:pointer;
width:100%;
}

.overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:999;
}

/* PARTICLES */

.particle{
position:absolute;
width:6px;
height:6px;
background:white;
opacity:0.3;
border-radius:50%;
animation:float 8s infinite linear;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-100vh);}
}

</style>
</head>

<body>

<header>
<h1>🐍 Python Preparation</h1>
<button onclick="openTest()">Create Test</button>
</header>

<div class="container">

<div class="grid">

<div class="card">
<h3>Python Slides</h3>
<p>Complete Python preparation presentation.</p>
<button onclick="openView('slide')">View</button>
</div>

<div class="card">
<h3>Intro to Python</h3>
<p>Python introduction notes.</p>
<button onclick="openView('intro')">View</button>
</div>

<div class="card">
<h3>Sample Paper 2</h3>
<p>Practice question paper.</p>
<button onclick="openView('paper')">View</button>
</div>

</div>

</div>

<!-- VIEWER -->

<div class="viewer" id="viewer">
<button class="close" onclick="closeView()">Close</button>
<iframe id="frame"></iframe>
</div>

<!-- TEST PANEL -->

<div class="overlay" id="overlay"></div>

<div class="test-panel" id="testPanel">

<h3>Create Test</h3>

<input placeholder="Test Title">

<input placeholder="Question">

<input placeholder="Option A">

<input placeholder="Option B">

<input placeholder="Correct Answer">

<button>Create Test</button>

<button onclick="closeTest()">Cancel</button>

</div>

<script>

/* viewer */

function openView(type){

let url="";

if(type==="slide"){
url="https://docs.google.com/presentation/d/1vcF8gzhKg0uAV5NNViImJDW0RJOEaJ1l/preview";
}

if(type==="intro"){
url="https://drive.google.com/file/d/1ormrgT1Lc9VVkjrzZ0KLjWioqr6FLtQ1/preview";
}

if(type==="paper"){
url="https://drive.google.com/file/d/1Aq3TCM-PZ5ru1RBQGI2NcO6lHO48jaAQ/preview";
}

document.getElementById("viewer").style.display="block";
document.getElementById("frame").src=url;

}

function closeView(){
document.getElementById("viewer").style.display="none";
document.getElementById("frame").src="";
}

/* test panel */

function openTest(){
document.getElementById("overlay").style.display="block";
document.getElementById("testPanel").style.display="block";
}

function closeTest(){
document.getElementById("overlay").style.display="none";
document.getElementById("testPanel").style.display="none";
}

/* particles */

for(let i=0;i<40;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"%";

p.style.animationDuration=5+Math.random()*5+"s";

document.body.appendChild(p);

}

</script>

</body>
</html>
